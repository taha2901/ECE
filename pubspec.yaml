name: real_ecommerce
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  flutter_launcher_icons: ^0.14.4   # ← أيقونة التطبيق
  flutter_native_splash: ^2.4.7     # ← splash screen
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  jwt_decoder: ^2.0.1
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/

# ──────────────────────────────────────────────
# App Launcher Icon
# ──────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"        # الأيقونة الكاملة (مع حواف دائرية)
  adaptive_icon_background: "#3730A3"             # indigo — نفس لون الخلفية
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"  # الشنطة فقط بدون خلفية
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false

# ──────────────────────────────────────────────
# Native Splash Screen
# ──────────────────────────────────────────────
flutter_native_splash:
  color: "#3730A3"
  image: assets/icons/app_icon.png
  android_12:
    color: "#3730A3"
    image: assets/icons/app_icon.png
  ios: true
  android: true
  web: false